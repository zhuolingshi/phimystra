name: Build Windows
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 源代码
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npx tauri build
      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.2
          files: 源代码/src-tauri/target/release/bundle/msi/*.msi
      - name: Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.2
          files: 源代码/src-tauri/target/release/bundle/nsis/*.exe
