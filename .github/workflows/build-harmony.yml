name: Build HarmonyOS

on:
  push:
    tags:
      - 'harmony-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Cache HarmonyOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/harmonyos-sdk
          key: ohos-sdk-6.1.0.830-v2

      - name: Download HarmonyOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          mkdir -p "$SDK_HOME"

          SDK_BASE="https://raw.githubusercontent.com/xiaobingtech/commandline-tools-linux-x64-6.1.0.830/main"

          for i in $(seq 1 20); do
            PART=$(printf "%03d" $i)
            echo "Downloading part $PART/020..."
            curl -fSL --retry 3 "$SDK_BASE/commandline-tools-linux-x64-6.1.0.830.7z.$PART" \
              -o "$SDK_HOME/commandline-tools-linux-x64-6.1.0.830.7z.$PART"
          done

          cd "$SDK_HOME"
          cat commandline-tools-linux-x64-6.1.0.830.7z.0* > merged.7z
          7z x merged.7z -y
          rm -f merged.7z commandline-tools-linux-x64-6.1.0.830.7z.0*
          unzip -q -o commandline-tools-linux-x64-6.1.0.830.zip
          rm -f commandline-tools-linux-x64-6.1.0.830.zip

      - name: Configure SDK Environment
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          CLT_DIR="$SDK_HOME/command-line-tools"

          # Add bin dirs to PATH
          for d in "$CLT_DIR/bin" "$CLT_DIR/hstack/bin"; do
            if [ -d "$d" ]; then
              echo "$d" >> $GITHUB_PATH
            fi
          done

          # SDK directory
          SDK_DIR="$CLT_DIR/sdk/default"
          echo "DEVECO_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=$SDK_DIR" >> $GITHUB_ENV

          # Create .npmrc for hvigor: @ohos scope → ohpm, rest → npmjs
          cat > "$HOME/.npmrc" << 'EOF'
          registry=https://registry.npmjs.org/
          @ohos:registry=https://ohpm.openharmony.cn/ohpm/
          strict-ssl=false
          EOF

          echo "=== CLT_DIR contents ==="
          ls -la "$CLT_DIR"
          echo "=== bin contents ==="
          ls "$CLT_DIR/bin" 2>/dev/null || echo "no bin dir"
          echo "=== tool dir ==="
          ls "$CLT_DIR/tool" 2>/dev/null || echo "no tool dir"
          echo "=== find hvigor packages ==="
          find "$SDK_HOME" -maxdepth 6 -path "*/node_modules/@ohos/hvigor*" -type d 2>/dev/null | head -10
          echo "=== find all executables ==="
          find "$CLT_DIR" -maxdepth 3 -type f -executable 2>/dev/null | head -20

      - name: Install Dependencies
        working-directory: harmonyos
        run: |
          # Create package.json for npm/pnpm compatibility
          if [ ! -f package.json ]; then
            cp oh-package.json5 package.json 2>/dev/null || true
          fi
          ohpm install 2>&1 || echo "ohpm install failed, continuing..."

      - name: Build HAP
        working-directory: harmonyos
        run: |
          chmod +x hvigorw
          ./hvigorw assembleHap --mode module -p product=default --no-daemon 2>&1 || {
            echo "=== Retrying with SDK hvigorw ==="
            SDK_HVIGORW="$HOME/harmonyos-sdk/command-line-tools/bin/hvigorw"
            if [ -f "$SDK_HVIGORW" ]; then
              chmod +x "$SDK_HVIGORW"
              "$SDK_HVIGORW" assembleHap --mode module -p product=default --no-daemon \
                -p project=$GITHUB_WORKSPACE/harmonyos 2>&1
            else
              echo "SDK hvigorw not found"
              exit 1
            fi
          }

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phimystra-harmonyos
          path: |
            harmonyos/entry/build/
            harmonyos/build/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HAP to Release
        if: startsWith(github.ref, 'refs/tags/harmony-v') && success()
        uses: softprops/action-gh-release@v2
        with:
          files: harmonyos/entry/build/default/outputs/default/*.hap
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
