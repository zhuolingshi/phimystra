name: Build HarmonyOS

on:
  push:
    tags:
      - 'harmony-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Cache HarmonyOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/harmonyos-sdk
          key: ohos-sdk-6.1.0.830-v1

      - name: Download HarmonyOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          mkdir -p "$SDK_HOME"

          SDK_BASE="https://raw.githubusercontent.com/xiaobingtech/commandline-tools-linux-x64-6.1.0.830/main"

          for i in $(seq 1 20); do
            PART=$(printf "%03d" $i)
            echo "Downloading part $PART/020..."
            curl -fSL --retry 3 "$SDK_BASE/commandline-tools-linux-x64-6.1.0.830.7z.$PART" \
              -o "$SDK_HOME/commandline-tools-linux-x64-6.1.0.830.7z.$PART"
          done

          cd "$SDK_HOME"
          # Step 1: merge split parts into single 7z
          7z x commandline-tools-linux-x64-6.1.0.830.7z.001 -y
          rm -f commandline-tools-linux-x64-6.1.0.830.7z.0*

          # Step 2: extract the inner 7z
          7z x commandline-tools-linux-x64-6.1.0.830.7z -y
          rm -f commandline-tools-linux-x64-6.1.0.830.7z

          echo "=== SDK structure ==="
          find "$SDK_HOME" -maxdepth 4 -type d 2>/dev/null | head -40
          echo "=== Key files ==="
          find "$SDK_HOME" -maxdepth 5 \( -name "ohpm" -o -name "hvigorw" -o -name "hvigor" \) 2>/dev/null

      - name: Configure SDK Environment
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"

          # Find command-line tools bin directory
          BIN_DIR=$(find "$SDK_HOME" -maxdepth 4 -name "ohpm" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          if [ -z "$BIN_DIR" ]; then
            BIN_DIR=$(find "$SDK_HOME" -maxdepth 4 -name "hvigorw" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null || true)
          fi

          echo "BIN_DIR: ${BIN_DIR:-NOT_FOUND}"

          # Find SDK root (where openharmony/ or hms/ dirs are)
          SDK_DIR=$(find "$SDK_HOME" -maxdepth 5 -name "openharmony" -type d 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "$SDK_HOME")
          echo "SDK_DIR: $SDK_DIR"

          # Add bin to PATH
          if [ -n "$BIN_DIR" ]; then
            echo "$BIN_DIR" >> $GITHUB_PATH
          fi

          echo "DEVECO_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=$SDK_DIR" >> $GITHUB_ENV

          # List key binaries
          echo "=== Key files ==="
          find "$SDK_HOME" -maxdepth 5 \( -name "ohpm" -o -name "hvigorw" -o -name "hvigor" -o -name "sdkmgr" \) 2>/dev/null

      - name: Install Dependencies
        working-directory: harmonyos
        run: |
          if command -v ohpm &>/dev/null; then
            ohpm install
          else
            echo "ohpm not found in PATH"
            npm install
          fi

      - name: Build HAP
        working-directory: harmonyos
        run: |
          chmod +x hvigorw

          # Try SDK's hvigorw first, then project's wrapper
          if command -v hvigorw &>/dev/null; then
            echo "=== Using SDK hvigorw ==="
            hvigorw assembleHap --mode module -p product=default --no-daemon \
              -p project=$GITHUB_WORKSPACE/harmonyos
          else
            echo "=== Using project hvigorw ==="
            ./hvigorw assembleHap --mode module -p product=default --no-daemon
          fi

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phimystra-harmonyos
          path: |
            harmonyos/entry/build/
            harmonyos/build/
            harmonyos/**/*.log
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HAP to Release
        if: startsWith(github.ref, 'refs/tags/harmony-v') && success()
        uses: softprops/action-gh-release@v2
        with:
          files: harmonyos/entry/build/default/outputs/default/*.hap
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
