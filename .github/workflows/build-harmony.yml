name: Build HarmonyOS

on:
  push:
    tags:
      - 'harmony-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Cache HarmonyOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/harmonyos-sdk
          key: ohos-sdk-6.1.0.830-v2

      - name: Download HarmonyOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          mkdir -p "$SDK_HOME"

          SDK_BASE="https://raw.githubusercontent.com/xiaobingtech/commandline-tools-linux-x64-6.1.0.830/main"

          for i in $(seq 1 20); do
            PART=$(printf "%03d" $i)
            echo "Downloading part $PART/020..."
            curl -fSL --retry 3 "$SDK_BASE/commandline-tools-linux-x64-6.1.0.830.7z.$PART" \
              -o "$SDK_HOME/commandline-tools-linux-x64-6.1.0.830.7z.$PART"
          done

          cd "$SDK_HOME"
          cat commandline-tools-linux-x64-6.1.0.830.7z.0* > merged.7z
          7z x merged.7z -y
          rm -f merged.7z commandline-tools-linux-x64-6.1.0.830.7z.0*
          unzip -q -o commandline-tools-linux-x64-6.1.0.830.zip
          rm -f commandline-tools-linux-x64-6.1.0.830.zip

      - name: Configure SDK Environment
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          CLT_DIR="$SDK_HOME/command-line-tools"

          # SDK bundled tool paths
          HVIGORW="$CLT_DIR/hvigor/bin/hvigorw"
          OHPM=$(find "$CLT_DIR" -name "ohpm" -type f 2>/dev/null | head -1)

          # Add to PATH
          echo "$CLT_DIR/hvigor/bin" >> $GITHUB_PATH
          echo "$CLT_DIR/tool/node/bin" >> $GITHUB_PATH
          if [ -n "$OHPM" ]; then
            echo "$(dirname "$OHPM")" >> $GITHUB_PATH
          fi

          SDK_DIR="$CLT_DIR/sdk/default"
          echo "DEVECO_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$SDK_HOME" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=$SDK_DIR" >> $GITHUB_ENV

          # .npmrc: @ohos scope → ohpm registry
          cat > "$HOME/.npmrc" << 'EOF'
          registry=https://registry.npmjs.org/
          @ohos:registry=https://ohpm.openharmony.cn/ohpm/
          strict-ssl=false
          EOF

      - name: Install Dependencies
        working-directory: harmonyos
        run: |
          OHPM_BIN=$(command -v ohpm 2>/dev/null)
          if [ -n "$OHPM_BIN" ]; then
            "$OHPM_BIN" install 2>&1 || echo "ohpm install warning"
          else
            echo "ohpm not found, skipping"
          fi

      - name: Build HAP
        working-directory: harmonyos
        run: |
          SDK_HOME="$HOME/harmonyos-sdk"
          CLT_DIR="$SDK_HOME/command-line-tools"

          # Read bundled versions and update config
          HVIGOR_VER=$(node -p "require('$CLT_DIR/hvigor/hvigor/package.json').version")
          PLUGIN_VER=$(node -p "require('$CLT_DIR/hvigor/hvigor-ohos-plugin/package.json').version")
          echo "Bundled hvigor: $HVIGOR_VER, plugin: $PLUGIN_VER"

          cat > hvigor/hvigor-config.json5 << EOF
          {
            "modelVersion": "$HVIGOR_VER",
            "hvigorVersion": "$HVIGOR_VER",
            "dependencies": {
              "@ohos/hvigor-ohos-plugin": "$PLUGIN_VER"
            },
            "execution": {},
            "logging": { "level": "info" },
            "debugging": { "quiet": false },
            "nodeOptions": {}
          }
          EOF

          echo "=== Running build with project hvigorw ==="

          # Create symlinks in SDK so packages can resolve each other
          mkdir -p "$CLT_DIR/hvigor/node_modules/@ohos"
          ln -sf "$CLT_DIR/hvigor/hvigor" "$CLT_DIR/hvigor/node_modules/@ohos/hvigor"
          ln -sf "$CLT_DIR/hvigor/hvigor-ohos-plugin" "$CLT_DIR/hvigor/node_modules/@ohos/hvigor-ohos-plugin"

          # Also in project node_modules
          mkdir -p node_modules/@ohos
          ln -sf "$CLT_DIR/hvigor/hvigor" node_modules/@ohos/hvigor
          ln -sf "$CLT_DIR/hvigor/hvigor-ohos-plugin" node_modules/@ohos/hvigor-ohos-plugin

          chmod +x hvigorw
          ./hvigorw assembleHap --mode module -p product=default --no-daemon --stacktrace 2>&1 || {
            echo "=== Build failed. Dumping validate-util source ==="
            CLT_DIR="$HOME/harmonyos-sdk/command-line-tools"
            grep -n "modelVersionCheck\|model_version\|MODEL_VERSION\|projectStatusCheck\|upgrade" \
              "$CLT_DIR/hvigor/hvigor-ohos-plugin/src/utils/validate/validate-util.js" 2>/dev/null | head -20
            echo "=== Dumping project-model source ==="
            grep -n "projectStatusCheck\|modelVersion\|MODEL\|upgrade\|00303024" \
              "$CLT_DIR/hvigor/hvigor-ohos-plugin/src/model/project/core-project-model-impl.js" 2>/dev/null | head -20
            exit 1
          }

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phimystra-harmonyos
          path: |
            harmonyos/entry/build/
            harmonyos/build/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HAP to Release
        if: startsWith(github.ref, 'refs/tags/harmony-v') && success()
        uses: softprops/action-gh-release@v2
        with:
          files: harmonyos/entry/build/default/outputs/default/*.hap
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
